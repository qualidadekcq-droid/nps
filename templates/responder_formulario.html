<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>{{ formulario.titulo }}</title>

<link rel="shortcut icon" href="{{ url_for('static', filename='favicon-32x32.png') }}">

<style>
body {
    margin: 0;
    padding: 12px;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #000;
    color: #fff;
    font-family: 'Segoe UI', sans-serif;
    box-sizing: border-box;
}

.page-wrap {
    width: 100%;
    max-width: 650px;
    box-sizing: border-box;
    padding: 10px 0;
}

.header-box {
    text-align: center;
    margin-bottom: 30px;
}

.title {
    font-size: 1.8rem;
    font-weight: 800;
    color: #facc15;
    margin-bottom: 8px;
    line-height: 1.3;
}

@media (min-width: 480px) {
    .title {
        font-size: 2.3rem;
    }
}

.subtitle {
    opacity: .75;
    font-size: 1rem;
    line-height: 1.4;
}

.form-card {
    background: #0b0b0b;
    border: 1px solid rgba(250,204,21,.15);
    border-radius: 20px;
    padding: 20px;
    box-shadow: 0 12px 30px rgba(0,0,0,.35);
    box-sizing: border-box;
    width: 100%;
}

@media (min-width: 480px) {
    .form-card {
        padding: 35px;
    }
}

.question {
    margin-bottom: 28px;
    box-sizing: border-box;
}

.label {
    display: block;
    font-weight: 700;
    margin-bottom: 12px;
    font-size: 1rem;
    color: #facc15;
    line-height: 1.4;
}

.input,
.textarea,
.select {
    width: 100%;
    padding: 14px;
    border-radius: 12px;
    border: 1px solid rgba(255,255,255,.08);
    background: #0a0a0a;
    color: #fff;
    font-size: 1rem;
    box-sizing: border-box;
    -webkit-appearance: none;
}

.textarea {
    resize: vertical;
    min-height: 120px;
}

.input::placeholder,
.textarea::placeholder {
    color: #777;
}

/* Modificado para distribuir os números do NPS de forma responsiva no celular */
.nps-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
}

.note-btn {
    flex: 1 1 calc(20% - 8px);
    min-width: 40px;
    max-width: 48px;
    height: 44px;
    border: none;
    border-radius: 10px;
    background: #1b1b1b;
    color: #fff;
    cursor: pointer;
    font-weight: 700;
    font-size: 1rem;
    box-sizing: border-box;
    transition: all 0.2s ease;
}

.note-btn:hover {
    background: #facc15;
    color: #000;
}

.radio-group {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
}

.radio-box {
    flex: 1;
    min-width: 120px;
}

.radio-box label {
    display: block;
    background: #0a0a0a;
    border: 1px solid rgba(255,255,255,.08);
    padding: 14px;
    border-radius: 12px;
    text-align: center;
    cursor: pointer;
    font-weight: 600;
}

.radio-box input {
    display: none;
}

.radio-box input:checked + label {
    background: #facc15;
    color: #000;
    font-weight: 800;
    border-color: #facc15;
}

.submit-btn {
    width: 100%;
    padding: 16px;
    border: none;
    border-radius: 12px;
    background: #facc15;
    color: #000;
    font-size: 1rem;
    font-weight: 800;
    cursor: pointer;
    transition: .2s;
}

.submit-btn:hover {
    background: #ffe36b;
}
</style>
</head>

<body>

<div class="page-wrap">

    <div class="header-box">
        <h1 class="title">{{ formulario.titulo }}</h1>
        <div class="subtitle">{{ formulario.descricao }}</div>
    </div>

    <div class="form-card">
        <form method="POST" action="/responder-formulario">

            <input type="hidden" name="formulario_id" value="{{ formulario.id }}">

            {% for p in perguntas %}
            <div class="question">

                <label class="label">{{ p.pergunta }}</label>

                {% if p.tipo == 'texto' %}
                    <input type="text"
                           name="pergunta_{{ p.id }}"
                           class="input"
                           placeholder="Digite sua resposta">

                {% elif p.tipo == 'textarea' %}
                    <textarea
                        name="pergunta_{{ p.id }}"
                        class="textarea"
                        placeholder="Digite sua resposta"></textarea>

                {% elif p.tipo == 'nota_1_5' %}
                    <select name="pergunta_{{ p.id }}" class="select">
                        <option value="">Selecione</option>
                        {% for n in range(1,6) %}
                        <option value="{{ n }}">{{ n }}</option>
                        {% endfor %}
                    </select>

                {% elif p.tipo == 'nota_0_10' %}
                    <div class="nps-grid">
                        {% for n in range(0,11) %}
                        <button type="button"
                                class="note-btn"
                                onclick="document.getElementById('nps{{ p.id }}').value='{{ n }}'; this.parentNode.querySelectorAll('button').forEach(x=>{x.style.background='#1b1b1b'; x.style.color='#fff'}); this.style.background='#facc15'; this.style.color='#000';">
                            {{ n }}
                        </button>
                        {% endfor %}
                    </div>
                    <input type="hidden" id="nps{{ p.id }}" name="pergunta_{{ p.id }}">

                {% elif p.tipo == 'sim_nao' %}
                    <div class="radio-group">

                        <div class="radio-box">
                            <input type="radio"
                                   id="sim{{ p.id }}"
                                   name="pergunta_{{ p.id }}"
                                   value="Sim">
                            <label for="sim{{ p.id }}">Sim</label>
                        </div>

                        <div class="radio-box">
                            <input type="radio"
                                   id="nao{{ p.id }}"
                                   name="pergunta_{{ p.id }}"
                                   value="Não">
                            <label for="nao{{ p.id }}">Não</label>
                        </div>

                    </div>

                {% endif %}

            </div>
            {% endfor %}

            <button type="submit" class="submit-btn">
                Enviar Respostas
            </button>

        </form>
    </div>

</div>

</body>
</html>
