{% extends 'base.html' %}
{% block content %}

<div style="max-width:700px;margin:auto;padding:30px">

<h2>{{ formulario.titulo }}</h2>

<form method="POST" action="/responder-formulario">
    <input type="hidden" name="formulario_id" value="{{ formulario.id }}">

    {% for p in perguntas %}
        <div style="margin-bottom:15px;">
            <label>{{ p.pergunta }}</label><br>
            <input name="pergunta_{{ p.id }}" style="width:100%;padding:8px;">
        </div>
    {% endfor %}

    <button type="submit">Enviar</button>
</form>

</div>

<!-- CÓDIGO CIRÚRGICO ADICIONADO ABAIXO PARA REMOVER A SIDEBAR APENAS NESTA TELA -->
<script>
    document.addEventListener("DOMContentLoaded", function() {
        // Seleciona a barra lateral criada pelo base.html e a esconde
        var sidebar = document.querySelector('.sidebar');
        if (sidebar) {
            sidebar.style.display = 'none';
        }
        
        // Seleciona o bloco de conteúdo e remove a margem esquerda para centralizar a tela
        var content = document.querySelector('.content');
        if (content) {
            content.style.marginLeft = '0px';
        }
    });
</script>

{% endblock %}
