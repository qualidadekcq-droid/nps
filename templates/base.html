<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}NPS{% endblock %}</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; overflow-x: hidden; }
        
        .sidebar {
            width: 220px;
            height: 100dvh;
            background: #0a0a0a;
            border-right: 1px solid rgba(250, 204, 21, 0.15);
            position: fixed;
            padding: 28px 22px;
            z-index: 100;
        }

        .sidebar-header { display: flex; align-items: center; gap: 12px; margin-bottom: 40px; }
        .sidebar-logo { width: 25px; height: auto; }
        .brand-text { margin: 0; font-size: 1.4rem; font-weight: 700; color: #ffffff; letter-spacing: 1px; }
        
        .nav-link-custom.active {
            color: #facc15;
            opacity: 1;
            font-weight: 600;
        }
        
        .nav-link-custom { 
            display: block;
            color: #fff;
            text-decoration: none; 
            margin: 18px 0;
            font-size: 1rem;
            opacity: 0.7;
            transition: 0.3s; 
        }

        .nav-link-custom:hover {
            opacity: 1;
            color: #facc15;
            padding-left: 5px;
        }

        .content {
            margin-left: 264px;
            padding: 40px;
            min-height: 100vh;
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="sidebar-header">
            <img src="{{ url_for('static', filename='logo.png') }}" class="sidebar-logo">
            <h3 class="brand-text">NPS</h3>
        </div>

        <nav>
            <!-- MENU -->
            <a href="/" class="nav-link-custom {% if request.path == '/' %}active{% endif %}">Painel</a>

            <a href="/treinamentos" class="nav-link-custom {% if '/treinamentos' in request.path %}active{% endif %}">Treinamentos</a>

            <a href="/participantes" class="nav-link-custom {% if '/participantes' in request.path %}active{% endif %}">Participantes</a>

            <a href="/relatorios" class="nav-link-custom {% if '/relatorios' in request.path %}active{% endif %}">Relatórios</a>

            <!-- SEPARADOR -->
            <hr style="border:0; border-top:1px solid rgba(255,255,255,0.08); margin:28px 0;">

            <!-- CONTA -->
            <a href="/trocar-senha" class="nav-link-custom {% if '/trocar-senha' in request.path %}active{% endif %}">Trocar Senha</a>

            <a href="/logout" class="nav-link-custom">Sair</a>
        </nav>
    </div>

    <div class="content">
{% with messages = get_flashed_messages() %}
  {% if messages %}
    <div style="margin-bottom:20px;">
      {% for msg in messages %}
        <div style="
          background:#111;
          border:1px solid #facc15;
          color:#fff;
          padding:12px;
          border-radius:8px;
          margin-bottom:10px;
        ">
          {{ msg }}
        </div>
      {% endfor %}
    </div>
  {% endif %}
{% endwith %}
        {% block content %}{% endblock %}
    </div>

</body>
</html>
