{% extends 'base.html' %}
{% block content %}

<style>
.page-wrap{
    min-height:80vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:40px 20px;
}

.box{
    background:#0a0a0a;
    border:1px solid rgba(250,204,21,.25);
    border-radius:22px;
    padding:55px;
    text-align:center;
    max-width:520px;
    width:100%;
    box-shadow:0 15px 40px rgba(0,0,0,.45);
}

.icon{
    font-size:4rem;
    margin-bottom:18px;
}

.title{
    color:#facc15;
    font-size:2.2rem;
    font-weight:800;
    margin-bottom:10px;
    letter-spacing:1px;
}

.text{
    opacity:.82;
    font-size:1.05rem;
    line-height:1.7;
}

.footer{
    margin-top:28px;
    padding-top:22px;
    border-top:1px solid rgba(255,255,255,.08);
    font-size:.85rem;
    opacity:.55;
}
</style>

<div class="page-wrap">

    <div class="box">

        <div class="icon">✅</div>

        <div class="title">OBRIGADO!</div>

        <div class="text">
            Sua avaliação foi enviada com sucesso.<br>
            Sua opinião é fundamental para melhorarmos continuamente nossos treinamentos.
        </div>

        <div class="footer">
            Você já pode fechar esta aba.
        </div>

    </div>

</div>

{% endblock %}
