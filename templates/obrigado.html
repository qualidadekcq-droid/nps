{% extends 'base.html' %}
{% block content %}
<div style="display: flex; flex-direction: column; align-items: center; justify-content: center; height: 80vh; text-align: center;">
    <div style="background: #0a0a0a; border: 1px solid rgba(250, 204, 21, 0.3); padding: 50px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);">
        <div style="font-size: 4rem; margin-bottom: 20px;">✅</div>
        <h1 style="color: #facc15; font-weight: 800; margin-bottom: 10px;">OBRIGADO!</h1>
        <p style="opacity: 0.8; font-size: 1.1rem; max-width: 400px; line-height: 1.6;">
            Sua avaliação foi enviada com sucesso. Sua opinião é fundamental para melhorarmos nossos treinamentos.
        </p>
        <div style="margin-top: 30px; border-top: 1px solid rgba(255,255,255,0.1); pt-3">
            <p style="font-size: 0.8rem; opacity: 0.5; margin-top: 20px;">Você já pode fechar esta aba.</p>
        </div>
    </div>
</div>
{% endblock %}
